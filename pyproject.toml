[project]
name = "libephemeris"
version = "0.23.0"
description = "A high-precision, open-source astronomical ephemeris library for Python, powered by Skyfield."
readme = "README.md"
requires-python = ">=3.9"
license = "LGPL-3.0-only"
license-files = ["LICENSE"]
authors = [
    { name = "Giacomo Battaglia", email = "giacomo@libephemeris.dev" }
]
maintainers = [
    { name = "Giacomo Battaglia", email = "giacomo@libephemeris.dev" }
]
keywords = [
    "astronomy",
    "ephemeris",
    "astrology",
    "planetary",
    "skyfield",
    "jpl-de440",
    "astrological",
    "celestial",
    "horoscope",
    "zodiac",
]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "Intended Audience :: Science/Research",
    "Intended Audience :: Developers",
    "Intended Audience :: Education",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",

    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Astronomy",
    "Topic :: Scientific/Engineering :: Physics",
    "Typing :: Typed",
]
dependencies = [
    "skyfield>=1.54",  # 1.54: deflectors= arg, 30% faster risings/settings, NumPy array Time subtraction
    "skyfield-data>=7.0.0",
    "astroquery>=0.4.7",  # Required for automatic SPK kernel downloads from JPL Horizons
    "certifi",  # SSL certificates for HTTPS connections to JPL Horizons
    "spktype21>=0.1.0",  # Support for SPK type 21 files from JPL Horizons (asteroids, comets)
    "pyerfa>=2.0.0",  # IAU ERFA: high-precision nutation (IAU 2006/2000A), obliquity, precession, aberration
]

[project.optional-dependencies]
# Star catalog building (scripts/build_star_catalog.py)
stars = [
    "astropy>=5.0.0",
]
# N-body integration for asteroid orbit propagation
nbody = [
    "rebound>=4.0.0",
    "assist>=1.1.0",
]
# All optional features
all = [
    "rebound>=4.0.0",
    "assist>=1.1.0",
]
dev = [
    "black>=25.1.0",
    "mypy>=1.0.0",
    "poethepoet>=0.37.0,<0.38.0",
    "pyswisseph>=2.10.3.2",  # Comparison/validation tests only — not a runtime dependency
    "pytest>=8.0.0,<9.0.0",
    "pytest-xdist>=3.5.0",
    "ruff>=0.14.6",
    "pytest-cov>=6.0.0",
    "build>=1.0.0",
    "twine>=5.0.0",
    "pytest-sugar>=1.1.1",
    "spiceypy>=6.0.0",  # For generating compact planet center SPK files
]
docs = [
    "sphinx>=7.0.0",
    "sphinx-rtd-theme>=2.0.0",
    "myst-parser>=2.0.0",
]

[project.urls]
Homepage = "https://github.com/g-battaglia/libephemeris"
Documentation = "https://github.com/g-battaglia/libephemeris#readme"
Repository = "https://github.com/g-battaglia/libephemeris"
Issues = "https://github.com/g-battaglia/libephemeris/issues"
Changelog = "https://github.com/g-battaglia/libephemeris/blob/main/CHANGELOG.md"

[project.scripts]
libephemeris = "libephemeris.cli:main"



[build-system]
requires = ["setuptools>=77.0.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
packages = ["libephemeris"]

[tool.setuptools.package-data]
libephemeris = ["py.typed", "data/*.csv"]

[tool.poe.tasks]
format = "ruff format ."
format-black = "black libephemeris tests"
lint = "ruff check . --fix"

# Test commands - fast variants exclude @pytest.mark.slow tests
test = "pytest -m \"not slow\""
"test:full" = "pytest"
"test:progress" = "pytest --no-header -q -m \"not slow\""
"test:fast" = "pytest -n auto -m \"not slow\""
"test:full:fast" = "pytest -n auto"

# Essential subset - 1 test file per library module, parallel (~490 tests vs ~5000 total)
# Covers: planets, houses, eclipse, lunar, fixed_stars, minor_bodies, hypothetical,
#         heliacal, rise/transit, arabic_parts, planetary_moons, time_utils,
#         exceptions, context/state, sidereal, utils, constants/API
"test:fast:essential" = """pytest -n auto -m "not slow" \
    tests/test_planets/test_central_difference_velocity.py \
    tests/test_planets/test_nod_aps.py \
    tests/test_houses/test_house_algorithms.py \
    tests/test_lunar_eclipse.py \
    tests/test_lunar/test_interpolated_apogee.py \
    tests/test_fixed_stars/test_fixstar2.py \
    tests/test_asteroid_by_number.py \
    tests/test_hypothetical.py \
    tests/test_heliacal.py \
    tests/test_rise_trans.py \
    tests/test_arabic_parts.py \
    tests/test_planetary_moons.py \
    tests/test_time/test_date_conversion.py \
    tests/test_exception_hierarchy.py \
    tests/test_close.py \
    tests/test_sidereal/test_ayanamsa_precision.py \
    tests/test_deg_midp.py \
    tests/test_get_planet_name.py"""

# Unit tests (tests/ directory)
"test:unit" = "pytest tests/ -v -m \"not slow\""
"test:unit:full" = "pytest tests/ -v"
"test:unit:fast" = "pytest tests/ -n auto -m \"not slow\""

# Comparison tests (compare_scripts/tests/ directory)
"test:compare" = "pytest compare_scripts/tests/ -v -m \"not slow\""
"test:compare:full" = "pytest compare_scripts/tests/ -v"
"test:compare:fast" = "pytest compare_scripts/tests/ -n auto -m \"not slow\""

# Tier diagnostics - show all bodies with coordinates, velocities, and data source
"diag:base" = "python scripts/tier_diagnostic_base.py"
"diag:medium" = "python scripts/tier_diagnostic_medium.py"
"diag:extended" = "python scripts/tier_diagnostic_extended.py"
"diag:download" = "python -c \"import libephemeris as eph; eph.ensure_all_ephemerides(show_progress=True)\""

# Tier-specific SPK downloads for minor bodies
"spk:download:base" = "python -c \"import libephemeris as eph; eph.set_precision_tier('base'); eph.ensure_all_ephemerides(show_progress=True)\""
"spk:download:medium" = "python -c \"import libephemeris as eph; eph.set_precision_tier('medium'); eph.ensure_all_ephemerides(show_progress=True)\""
"spk:download:extended" = "python scripts/download_max_range_spk.py"

# ASSIST data download (REBOUND/ASSIST n-body integration)
"download:assist" = "python -m libephemeris.cli download:assist"

# LEB binary ephemeris download (precomputed Chebyshev polynomials, ~14x speedup)
"download:leb:base" = "python -m libephemeris.cli download:leb:base"
"download:leb:medium" = "python -m libephemeris.cli download:leb:medium"
"download:leb:extended" = "python -m libephemeris.cli download:leb:extended"

# Planet centers SPK generation (requires spiceypy, downloads source satellite SPKs)
"generate-planet-centers:base" = "python scripts/generate_planet_centers_spk.py --tier base"
"generate-planet-centers:medium" = "python scripts/generate_planet_centers_spk.py --tier medium"
"generate-planet-centers:extended" = "python scripts/generate_planet_centers_spk.py --tier extended"
"generate-planet-centers:all" = "python scripts/generate_planet_centers_spk.py --all"

# Legacy alias
"generate-planet-centers-spk" = "python scripts/generate_planet_centers_spk.py --tier medium"

coverage = "pytest --cov=libephemeris --cov-report=term-missing --cov-report=xml --cov-report=html -m \"not slow\""
"coverage:full" = "pytest --cov=libephemeris --cov-report=term-missing --cov-report=xml --cov-report=html"
typecheck = "mypy libephemeris"

# Lunar test suites
"test:lunar" = "pytest tests/test_lunar/ -v -m \"not slow\""
"test:lunar:perigee" = """pytest -v \
    tests/test_lunar/test_elp2000_perigee_perturbations.py \
    tests/test_lunar/test_interpolated_perigee.py \
    tests/test_lunar/test_osculating_perigee.py"""
"test:lunar:apogee" = """pytest -v \
    tests/test_lunar/test_elp2000_apogee_perturbations.py \
    tests/test_lunar/test_interpolated_apogee.py"""
"test:lunar:lilith" = """pytest -v \
    tests/test_lunar/test_mean_lilith_enhanced.py \
    tests/test_lunar/test_true_lilith_precision.py \
    tests/test_lunar/test_true_lilith_annual_equation.py \
    tests/test_lunar/test_true_lilith_evection_secondary.py \
    tests/test_lunar/test_true_lilith_parallactic_inequality.py \
    tests/test_lunar/test_true_lilith_reduction_to_ecliptic.py \
    tests/test_lunar/test_true_lilith_solar_perturbation.py \
    tests/test_lunar/test_true_lilith_variation.py"""

# LEB test suites
"test:leb" = "pytest tests/test_leb/ -v -m \"not slow\""
"test:leb:precision" = "pytest tests/test_leb/test_leb_precision.py -v"
"test:leb:precision:quick" = "pytest tests/test_leb/test_leb_precision.py -v -k \"medium\""

# LEB vs Skyfield comparison tests (medium tier)
"test:leb:compare" = "pytest tests/test_leb/compare/ -v -m leb_compare --ignore=tests/test_leb/compare/base --ignore=tests/test_leb/compare/extended --ignore=tests/test_leb/compare/crosstier"
"test:leb:compare:quick" = "pytest tests/test_leb/compare/ -v -m \"leb_compare and not slow\" --ignore=tests/test_leb/compare/base --ignore=tests/test_leb/compare/extended --ignore=tests/test_leb/compare/crosstier"
"test:leb:compare:medium" = "pytest tests/test_leb/compare/ -v -m leb_compare --ignore=tests/test_leb/compare/base --ignore=tests/test_leb/compare/extended --ignore=tests/test_leb/compare/crosstier"
"test:leb:compare:medium:quick" = "pytest tests/test_leb/compare/ -v -m \"leb_compare and not slow\" --ignore=tests/test_leb/compare/base --ignore=tests/test_leb/compare/extended --ignore=tests/test_leb/compare/crosstier"

# LEB vs Skyfield comparison tests (base tier)
"test:leb:compare:base" = "pytest tests/test_leb/compare/base/ -v -m leb_compare_base"
"test:leb:compare:base:quick" = "pytest tests/test_leb/compare/base/ -v -m \"leb_compare_base and not slow\""

# LEB vs Skyfield comparison tests (extended tier)
"test:leb:compare:extended" = "pytest tests/test_leb/compare/extended/ -v -m leb_compare_extended"
"test:leb:compare:extended:quick" = "pytest tests/test_leb/compare/extended/ -v -m \"leb_compare_extended and not slow\""

# LEB cross-tier consistency tests
"test:leb:compare:crosstier" = "pytest tests/test_leb/compare/crosstier/ -v -m leb_compare_crosstier"

# LEB comparison: all tiers combined
"test:leb:compare:all" = "pytest tests/test_leb/compare/ -v -m \"leb_compare or leb_compare_base or leb_compare_extended or leb_compare_crosstier\""

# Lunar corrections and calibration
[tool.poe.tasks.generate-lunar-corrections]
cmd = "python scripts/generate_lunar_corrections.py --force"
help = "Regenerate precomputed correction tables for mean lunar elements (requires de441.bsp)"

[tool.poe.tasks.calibrate-perigee]
cmd = "python scripts/calibrate_perigee_perturbations.py --start-year 1500 --end-year 2500 --output /tmp/perigee_calibration.json"
help = "Calibrate perigee perturbation coefficients against JPL DE441 (full run, ~30 min)"
envfile = ".env"

[tool.poe.tasks."calibrate-perigee:quick"]
cmd = "python scripts/calibrate_perigee_perturbations.py --quick --output /tmp/perigee_calibration_quick.json"
help = "Quick perigee calibration (100-year range, ~2 min, for validation)"
envfile = ".env"

# Keplerian fallback — multi-epoch element generation
[tool.poe.tasks."keplerian:generate-multi-epoch"]
cmd = "python scripts/generate_multi_epoch_elements.py"
help = "Generate multi-epoch Keplerian elements from SPK files (20-year intervals, all bodies)"

[tool.poe.tasks."keplerian:generate-multi-epoch:dry-run"]
cmd = "python scripts/generate_multi_epoch_elements.py --dry-run"
help = "Show available SPK files and epoch grid without generating (Keplerian fallback)"

# LEB (binary ephemeris) generation — full (all bodies at once)
[tool.poe.tasks."leb:generate:base"]
cmd = "python scripts/generate_leb.py --tier base --verify"
help = "Generate base tier LEB file (de440s, 1850-2150)"

[tool.poe.tasks."leb:generate:medium"]
cmd = "python scripts/generate_leb.py --tier medium --verify"
help = "Generate medium tier LEB file (de440, 1550-2650)"

[tool.poe.tasks."leb:generate:extended"]
cmd = "python scripts/generate_leb.py --tier extended --verify"
help = "Generate extended tier LEB file (de441, -5000 to 5000)"

[tool.poe.tasks."leb:generate:all"]
sequence = ["leb:generate:base", "leb:generate:medium", "leb:generate:extended"]
help = "Generate LEB files for all three tiers"

# LEB group generation — generate each body group independently, then merge.
# This avoids macOS fork-deadlock issues with multiprocessing and allows
# regenerating a single group without redoing everything.
[tool.poe.tasks."leb:generate:base:planets"]
cmd = "python scripts/generate_leb.py --tier base --group planets"
help = "Generate base tier planets group (Sun-Pluto, Earth)"

[tool.poe.tasks."leb:generate:base:asteroids"]
cmd = "python scripts/generate_leb.py --tier base --group asteroids"
help = "Generate base tier asteroids group (Chiron, Ceres-Vesta)"

[tool.poe.tasks."leb:generate:base:analytical"]
cmd = "python scripts/generate_leb.py --tier base --group analytical"
help = "Generate base tier analytical group (nodes, Lilith, Uranians)"

[tool.poe.tasks."leb:generate:base:merge"]
cmd = """python scripts/generate_leb.py --tier base --merge \
data/leb/ephemeris_base_planets.leb \
data/leb/ephemeris_base_asteroids.leb \
data/leb/ephemeris_base_analytical.leb \
--verify"""
help = "Merge base tier partial files into ephemeris_base.leb"

[tool.poe.tasks."leb:generate:base:groups"]
sequence = ["leb:generate:base:planets", "leb:generate:base:asteroids", "leb:generate:base:analytical", "leb:generate:base:merge"]
help = "Generate base tier via groups (planets + asteroids + analytical) then merge"

[tool.poe.tasks."leb:generate:base:single"]
cmd = "python scripts/generate_leb.py --tier base --single --verify"
help = "Generate base tier one body at a time (lowest memory usage)"

# Targeted body generation — generate a single body (or comma-separated list).
# Accepts numeric IDs or names (case-insensitive).
# Usage: poe leb:generate:base:body moon
#        poe leb:generate:base:body "moon,sun,mercury"
#        poe leb:generate:base:body 1
[tool.poe.tasks."leb:generate:base:body"]
cmd = "python scripts/generate_leb.py --tier base --bodies ${body}"
help = "Generate base tier for specific body(ies) (e.g. 'moon', '1,2,3', 'sun,mercury')"
args = [{name = "body", positional = true, required = true, help = "Body ID(s) or name(s), comma-separated"}]

# Medium tier group generation
[tool.poe.tasks."leb:generate:medium:planets"]
cmd = "python scripts/generate_leb.py --tier medium --group planets"
help = "Generate medium tier planets group (Sun-Pluto, Earth)"

[tool.poe.tasks."leb:generate:medium:asteroids"]
cmd = "python scripts/generate_leb.py --tier medium --group asteroids"
help = "Generate medium tier asteroids group (Chiron, Ceres-Vesta)"

[tool.poe.tasks."leb:generate:medium:analytical"]
cmd = "python scripts/generate_leb.py --tier medium --group analytical"
help = "Generate medium tier analytical group (nodes, Lilith, Uranians)"

[tool.poe.tasks."leb:generate:medium:merge"]
cmd = """python scripts/generate_leb.py --tier medium --merge \
data/leb/ephemeris_medium_planets.leb \
data/leb/ephemeris_medium_asteroids.leb \
data/leb/ephemeris_medium_analytical.leb \
--verify"""
help = "Merge medium tier partial files into ephemeris_medium.leb"

[tool.poe.tasks."leb:generate:medium:groups"]
sequence = ["leb:generate:medium:planets", "leb:generate:medium:asteroids", "leb:generate:medium:analytical", "leb:generate:medium:merge"]
help = "Generate medium tier via groups (planets + asteroids + analytical) then merge"

[tool.poe.tasks."leb:generate:medium:single"]
cmd = "python scripts/generate_leb.py --tier medium --single --verify"
help = "Generate medium tier one body at a time (lowest memory usage)"

[tool.poe.tasks."leb:generate:medium:body"]
cmd = "python scripts/generate_leb.py --tier medium --bodies ${body}"
help = "Generate medium tier for specific body(ies) (e.g. 'moon', '1,2,3', 'sun,mercury')"
args = [{name = "body", positional = true, required = true, help = "Body ID(s) or name(s), comma-separated"}]

# Extended tier group generation
[tool.poe.tasks."leb:generate:extended:planets"]
cmd = "python scripts/generate_leb.py --tier extended --group planets"
help = "Generate extended tier planets group (Sun-Pluto, Earth)"

[tool.poe.tasks."leb:generate:extended:asteroids"]
cmd = "python scripts/generate_leb.py --tier extended --group asteroids"
help = "Generate extended tier asteroids group (Chiron, Ceres-Vesta)"

[tool.poe.tasks."leb:generate:extended:analytical"]
cmd = "python scripts/generate_leb.py --tier extended --group analytical"
help = "Generate extended tier analytical group (nodes, Lilith, Uranians)"

[tool.poe.tasks."leb:generate:extended:merge"]
cmd = """python scripts/generate_leb.py --tier extended --merge \
data/leb/ephemeris_extended_planets.leb \
data/leb/ephemeris_extended_asteroids.leb \
data/leb/ephemeris_extended_analytical.leb \
--verify"""
help = "Merge extended tier partial files into ephemeris_extended.leb"

[tool.poe.tasks."leb:generate:extended:groups"]
sequence = ["leb:generate:extended:planets", "leb:generate:extended:asteroids", "leb:generate:extended:analytical", "leb:generate:extended:merge"]
help = "Generate extended tier via groups (planets + asteroids + analytical) then merge"

[tool.poe.tasks."leb:generate:extended:single"]
cmd = "python scripts/generate_leb.py --tier extended --single --verify"
help = "Generate extended tier one body at a time (lowest memory usage)"

[tool.poe.tasks."leb:generate:extended:body"]
cmd = "python scripts/generate_leb.py --tier extended --bodies ${body}"
help = "Generate extended tier for specific body(ies) (e.g. 'moon', '1,2,3', 'sun,mercury')"
args = [{name = "body", positional = true, required = true, help = "Body ID(s) or name(s), comma-separated"}]

# LEB verify — verify existing .leb files without regenerating
[tool.poe.tasks."leb:verify:base"]
cmd = "python scripts/generate_leb.py --tier base --verify-only"
help = "Verify existing base tier .leb file"

[tool.poe.tasks."leb:verify:medium"]
cmd = "python scripts/generate_leb.py --tier medium --verify-only"
help = "Verify existing medium tier .leb file"

[tool.poe.tasks."leb:verify:extended"]
cmd = "python scripts/generate_leb.py --tier extended --verify-only"
help = "Verify existing extended tier .leb file"

# LEB release — upload generated .leb files to GitHub Releases (data-v1)
# Requires: gh CLI authenticated (gh auth login)
[tool.poe.tasks."release:leb"]
cmd = "python scripts/release_leb.py --version ${version} --update-hashes"
help = "Upload all LEB files to GitHub release and update hashes"
args = [{name = "version", positional = true, required = true, help = "Version string (e.g. 0.22.0)"}]

[tool.poe.tasks."release:leb:base"]
cmd = "python scripts/release_leb.py --version ${version} --tier base --update-hashes"
help = "Upload base tier LEB to GitHub release and update hashes"
args = [{name = "version", positional = true, required = true, help = "Version string (e.g. 0.22.0)"}]

[tool.poe.tasks."release:leb:medium"]
cmd = "python scripts/release_leb.py --version ${version} --tier medium --update-hashes"
help = "Upload medium tier LEB to GitHub release and update hashes"
args = [{name = "version", positional = true, required = true, help = "Version string (e.g. 0.22.0)"}]

[tool.poe.tasks."release:leb:extended"]
cmd = "python scripts/release_leb.py --version ${version} --tier extended --update-hashes"
help = "Upload extended tier LEB to GitHub release and update hashes"
args = [{name = "version", positional = true, required = true, help = "Version string (e.g. 0.22.0)"}]

[tool.poe.tasks."release:leb:dry-run"]
cmd = "python scripts/release_leb.py --version ${version} --dry-run"
help = "Dry run: show what LEB files would be uploaded"
args = [{name = "version", positional = true, required = true, help = "Version string (e.g. 0.22.0)"}]

[tool.pytest.ini_options]
markers = [
    "leb_compare: LEB vs Skyfield comparison tests (medium tier)",
    "leb_compare_base: LEB vs Skyfield comparison tests (base tier)",
    "leb_compare_extended: LEB vs Skyfield comparison tests (extended tier)",
    "leb_compare_crosstier: Cross-tier consistency tests",
    "slow: Slow tests excluded from default runs",
]

[tool.mypy]
python_version = "3.9"
warn_return_any = false
warn_unused_configs = true
ignore_missing_imports = true

[tool.ruff]
exclude = ["compare_scripts"]

[tool.black]
line-length = 88
target-version = ["py39"]
include = '\.pyi?$'
extend-exclude = '''
/(
  compare_scripts
)/
'''

[tool.ruff.lint]
# Ignore star imports (F403, F405) - the library uses star imports for constants
# Ignore unused imports in __init__.py (F401) - re-exports for public API
# Ignore module level imports not at top of file (E402) - intentional for __init__.py
ignore = ["F403", "F405", "F401", "E402"]
# Also ignore unused local variables (F841) for now - complex astronomical calculations
extend-ignore = ["F841"]

[tool.coverage.run]
source = ["libephemeris"]
branch = true
parallel = true
omit = [
    "libephemeris/__pycache__/*",
]

[tool.coverage.paths]
source = [
    "libephemeris/",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise NotImplementedError",
    "if TYPE_CHECKING:",
    "if __name__ == .__main__.:",
]
show_missing = true
precision = 2

[tool.coverage.xml]
output = "coverage.xml"

[tool.coverage.html]
directory = "htmlcov"
