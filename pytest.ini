[pytest]
minversion = 7.0
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
addopts =
    -s
    -v
    --strict-markers
    --tb=short
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    network: marks tests that require network access (deselect with '-m "not network"')
    precision: marks tests as high-precision tests
    comparison: marks tests as comparison with pyswisseph
    edge_case: marks tests as edge case tests
