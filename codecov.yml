# Codecov configuration for libephemeris
# https://docs.codecov.io/docs/codecovyml-reference

codecov:
  require_ci_to_pass: true

coverage:
  precision: 2
  round: down
  range: "60...100"

  status:
    project:
      default:
        target: auto
        threshold: 1%  # Allow 1% decrease from base
        if_ci_failed: error

      # Core modules: >80% coverage required
      core:
        target: 80%
        threshold: 2%
        paths:
          - "libephemeris/planets.py"
          - "libephemeris/houses.py"
          - "libephemeris/eclipse.py"
          - "libephemeris/crossing.py"
          - "libephemeris/fixed_stars.py"
          - "libephemeris/lunar.py"
          - "libephemeris/minor_bodies.py"
          - "libephemeris/time_utils.py"
          - "libephemeris/context.py"
          - "libephemeris/state.py"

      # Utilities: >60% coverage required
      utilities:
        target: 60%
        threshold: 2%
        paths:
          - "libephemeris/utils.py"
          - "libephemeris/angles.py"
          - "libephemeris/arabic_parts.py"
          - "libephemeris/exceptions.py"
          - "libephemeris/constants.py"
          - "libephemeris/__init__.py"

    patch:
      default:
        target: 70%
        threshold: 5%

parsers:
  gcov:
    branch_detection:
      conditional: yes
      loop: yes
      method: no
      macro: no

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: false

flags:
  core:
    paths:
      - libephemeris/planets.py
      - libephemeris/houses.py
      - libephemeris/eclipse.py
      - libephemeris/crossing.py
      - libephemeris/fixed_stars.py
      - libephemeris/lunar.py
      - libephemeris/minor_bodies.py
      - libephemeris/time_utils.py
      - libephemeris/context.py
      - libephemeris/state.py
    carryforward: true
  utilities:
    paths:
      - libephemeris/utils.py
      - libephemeris/angles.py
      - libephemeris/arabic_parts.py
      - libephemeris/exceptions.py
      - libephemeris/constants.py
      - libephemeris/__init__.py
    carryforward: true
